server {
    server_name xpertzwp.openxpertz.com;

    client_max_body_size 2G;

    location / {
        proxy_pass http://127.0.0.1:9080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
    }

    location ~ /\.(ht|git|env) {
        deny all;
        return 404;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location ~ \.(sql|log|bak|old|orig|save|swp)$ {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/xpertzwp.openxpertz.com.access.log;
    error_log /var/log/nginx/xpertzwp.openxpertz.com.error.log;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/xpertzwp.openxpertz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xpertzwp.openxpertz.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = xpertzwp.openxpertz.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name xpertzwp.openxpertz.com;
    return 404;
}
